# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: workload jobs and cronjobs
templates:
  - backup.yml
  - upgrade.yml
  - check.yml
tests:
  - it: should mount extra volumes for backup when provided
    set:
      backup.enabled: true
      backup.extraVolumes:
        - name: backup-certs
          secret:
            secretName: backup-certs
      backup.extraVolumeMounts:
        - name: backup-certs
          mountPath: /certs
    template: backup.yml
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.volumes
          content:
            name: backup-certs
            secret:
              secretName: backup-certs
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].volumeMounts
          content:
            name: backup-certs
            mountPath: /certs

  - it: should expose security contexts and extra mounts for upgrade jobs
    set:
      upgrade.force: true
      defaultVault.keyset.secretName: horizon-keyset
      defaultVault.keyset.secretKey: keyset
      upgrade.podSecurityContext.fsGroup: 2000
      upgrade.containerSecurityContext.runAsUser: 2000
      upgrade.extraVolumes:
        - name: migration-certs
          configMap:
            name: migration-certs
      upgrade.extraVolumeMounts:
        - name: migration-certs
          mountPath: /migration-certs
    template: upgrade.yml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 2000
      - contains:
          path: spec.template.spec.volumes
          content:
            name: migration-certs
            configMap:
              name: migration-certs
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: migration-certs
            mountPath: /migration-certs

  - it: should expose security contexts and extra mounts for upgrade compatibility checks
    set:
      defaultVault.keyset.secretName: horizon-keyset
      defaultVault.keyset.secretKey: keyset
      upgradeCompatibilityCheck.podSecurityContext.fsGroup: 3000
      upgradeCompatibilityCheck.containerSecurityContext.runAsUser: 3000
      upgradeCompatibilityCheck.extraVolumes:
        - name: check-certs
          secret:
            secretName: check-certs
      upgradeCompatibilityCheck.extraVolumeMounts:
        - name: check-certs
          mountPath: /check-certs
    template: check.yml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 3000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 3000
      - contains:
          path: spec.template.spec.volumes
          content:
            name: check-certs
            secret:
              secretName: check-certs
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: check-certs
            mountPath: /check-certs

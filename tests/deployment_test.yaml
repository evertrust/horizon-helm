# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: deployment scaling
templates:
  - deployment.yml
  - hpa.yml
tests:
  - it: should omit init containers by default
    template: deployment.yml
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: spec.template.spec.initContainers

  - it: should render init containers when provided
    template: deployment.yml
    set:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - "until nc -z mongodb 27017; do sleep 2; done"
          env:
            - name: HORIZON_IMAGE_REPOSITORY
              value: "{{ .Values.image.repository }}"
          volumeMounts:
            - name: config
              mountPath: /opt/horizon/etc
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: wait-for-mongodb
            image: busybox:1.36
            imagePullPolicy: IfNotPresent
            command:
              - sh
              - -c
              - "until nc -z mongodb 27017; do sleep 2; done"
            env:
              - name: HORIZON_IMAGE_REPOSITORY
                value: horizon
            volumeMounts:
              - name: config
                mountPath: /opt/horizon/etc

  - it: should render deployment replicas from replicas when autoscaling is disabled
    template: deployment.yml
    set:
      replicas: 4
      horizontalAutoscaler.enabled: false
      horizontalAutoscaler.minReplicas: 2
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 4

  - it: should omit deployment replicas and keep hpa minReplicas when autoscaling is enabled
    set:
      replicas: 4
      horizontalAutoscaler.enabled: true
      horizontalAutoscaler.minReplicas: 2
      horizontalAutoscaler.maxReplicas: 5
    template: deployment.yml
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: spec.replicas

  - it: should render hpa minReplicas when autoscaling is enabled
    set:
      horizontalAutoscaler.enabled: true
      horizontalAutoscaler.minReplicas: 2
      horizontalAutoscaler.maxReplicas: 5
    template: hpa.yml
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 5
